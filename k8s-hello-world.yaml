# ---------------------------------------------------------
# 1. Le Déploiement
# ---------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-world-deployment
  labels:
    app: hello-world
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-world
  template:
    metadata:
      labels:
        app: hello-world
    spec:
      containers:
        - name: spring-boot-app
          image: taoufykmed/demo-app:1.0
          ports:
            - containerPort: 8081

---

# ---------------------------------------------------------
# 2. Le Service (Gère l'accès réseau vers les Pods)
# ---------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: hello-world-service
spec:
  type: NodePort # Permet d'exposer le service à l'extérieur du cluster (utile pour Minikube)
  selector:
    app: hello-world
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081